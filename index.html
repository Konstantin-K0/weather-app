<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
        <title>Simple weather PWA</title>
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700&family=Roboto:wght@100;200;300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icon.png" />
        <link rel="stylesheet" href="style.css" />
        <script type="module" src="main.js"></script>
    </head>
    <body>
        <div class="weather-card">
            <!-- TOP: час і місто -->
            <header class="header">
                <div class="datetime">Searching...</div>
                <h1 id="city-name">Searching...</h1>
            </header>

            <div class="spacer">Searching...</div>

            <!-- СЕРЕДИНА: температура -->
            <div class="temp-container">
                <div class="temp-main-display">
                    <span class="main-temperature">--</span>
                    <span class="unit">°C</span>
                </div>

                <div class="high-low">
                    <span><span class="high-arrow">↑</span><span class="max-temperature">--</span>°C</span>
                    <span><span class="low-arrow">↓</span><span class="min-temperature">--</span>°C</span>
                </div>
            </div>

            <p class="condition">Searching...</p>

            <!-- НИЗ: прогноз погодинний -->
            <div class="forecast-wrapper">
                <svg class="temp-chart" id="temp-chart"></svg>
                <div class="forecast">
                </div>
            </div>
            <div class="daily-forecast">
            </div>
        </div>
    </body>
</html>
